edition = "2023";
import "google/protobuf/timestamp.proto";
import "google/protobuf/type/latlng.proto";

package uEventAnalysisTool.V1.Catalog;

import "UEventAnalysisToolAPI/v1/locator/observed_pick.proto";
import "UEventAnalysisToolAPI/v1/locator/estimate_pick.proto";

/**
 * Defines an event's origin.  In particular, this is an event's hypocenter.
 */
message Origin {
   // The origin identifier.
   string identifier = 1;  
   // The latitude and longitude of the event.
   google.protobuf.LatLng epicenter = 2;
   // The origin's depth in meters.
   double depth = 3;
   // The origin's time (UTC).
   google.protobuf.Timestamp time = 4;
   // The observed pick times.
   repeated ObservedPick observed_picks = 5;
   // The estimate pick times.  Note, this should match one-to-one the observed picks.  Residuals can then be computed as observed - estimated.
   repeated EstimatePick estimate_picks = 6;
   // True indicates the origin was reviewed by a human.
   bool reviewed = 7;
   // The human or algorithm that computed this location.
   string author = 8;
}
