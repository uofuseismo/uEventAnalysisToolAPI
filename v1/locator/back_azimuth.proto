edition = "2023";

package UEventAnalysisTool.V1.Locator;

/**
 * This is a measure of the receiver to source angle.  The back-azimuth is 
 * measured positive east of north (north being 0 degrees).  This will be in the
 * range of 0 (includsive) and 360 (exclusive) degrees.
 */
message BackAzimuth {
   /// Defines from where the back-azimuth was computed.
   enum Method {
      /// The back-azimuth was not computed.
      METHOD_NOT_COMPUTED = 0,
      /// It is unknown how the back-azimuth was computed.
      METHOD_UNKNOWN = 1,
      /// The back-azimuth was computed using geometry.  For example, it could be from
      /// computing the back-azimuth between two points in a WGS84 coordinate system.
      /// This is the more common situation.
      METHOD_FROM_GEOMETRY = 2,
      /// The back-azimuth was estimated from the waveform data.  For example, this could
      /// be done using a polarization analysis techinque - e.g., the SVD of the data
      /// covariance matrix.  Estimating this value from data is usually not done.
      METHOD_FROM_DATA = 3
   };
   /// The value of the back-azimuth in degrees.
   double value  [default = 0] = 1;
   /// The method from which the back-azimuth was computed.
   Method method [default = METHOD_NOT_COMPUTED] = 2;
}
