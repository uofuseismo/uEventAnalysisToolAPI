edition = "2023";
import "google/protobuf/timestamp.proto";

package uEventAnalysisTool.V1.Locator;

import "uEventAnalysisToolAPI/v1/locator/phase.proto";
import "uEventAnalysisToolAPI/v1/locator/uncertainty.proto";
import "uEventAnalysisToolAPI/v1/locator/stream_identifier.proto";
import "uEventAnalysisToolAPI/v1/locator/frame.proto";

/**
 * Defines a pick - a high-frequency approxmition that describes the onset of seismic
 * energy for a particular phase.
 */
message ObservedPick {
   /// The phase identifier.
   string identifier = 1;
   /// The stream identifier(s) on which the pick was made.  
   /// For example, a P pick is normally made on just the vertical (Z) channel.  
   /// Conversely, an S pick could be made on the North and East (1 and 2) channels 
   /// that were rotated into the Radial Transverse frame.  In that case, there would 
   /// be two stream identifiers - one for the North and one for the East channel.
   /// Alternatively, a deep-learning picker may use all three channels in some opaque manner.
   repeated StreamIdentifier stream_identifier = 2;
   /// The time of the pick (UTC).
   google.protobuf.Timestamp time = 3;
   /// The phase of the pick.
   Phase phase = 4;
   /// The person or algorithm who made the pick.
   string author = 5;
   /// If true then the pick's time was determined by some automated method.
   bool automatic = 6;
   /// The uncertainty bounds on the pick.
   Uncertainty uncertainty = 7;
   /// The reference frame in which the pick was made.  
   Frame frame = 8;
}
