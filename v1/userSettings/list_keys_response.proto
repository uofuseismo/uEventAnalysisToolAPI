edition = "2023";
import "google/protobuf/timestamp.proto";

package UEventAnalysisToolAPI.V1.UserSettings;

/**
 * The user's available keys.
 */
message ListKeysResponse {
   message Key {
     // The key name.
     string name = 1;
     // The algorithm.
     string algorithm = 2;
     // The time (UTC) when the key expires.
     google.protobuf.Timestamp expires = 3;
     // The time (UTC) when the key was created.
     google.protobuf.Timestamp created = 4;
     // The last time (UTC) the key was used.
     google.protobuf.Timestamp last_used = 5;
     // True indicates the key is active.
     bool active = 6;
   }
   // The request identifier corresponding to the input request.
   string identifier = 1 [default = ""];
   // The available keys.
   repeated Key keys = 2; 
}
