edition = "2023";
import "google/protobuf/duration.proto";

package UEventAnalysisToolAPI.V1.UserSettings;

/**
 * Response to the user's request to add their PUBLIC key.   Note, the user will be 
 * forced through basic authentication - i.e., they will have to provide their 
 * username and current password which will be put into the Authorization: Basic header.
 */
message AddKeyRequest {
   // A request identifier.
   string identifier = 1 [default = ""];
   // The key algorithm.
   string algorithm = 2 [default = "ed25519"];
   // The (base64) public key.  The frontend can handle this if reading from a file.
   string public_key = 3;
   // The key name - e.g., jane-laptop.
   string key_name = 4;
   // The key expires after this duration.  
   google.protobuf.Duration expires_after = 5;
}
