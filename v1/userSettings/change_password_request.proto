edition = "2023";

package UEventAnalysisToolAPI.V1.UserSettings;

/**
 * Updates the user's password.  
 */
message ChangePasswordRequest {
   // A request identifier.
   string identifier = 1 [default = ""];
   // The current password (plain text - requiring this prevents JWT account hijacking)
   string old_password = 2;
   // The new password (plain text - the backend will handle hashing).
   string new_password = 3;
}
