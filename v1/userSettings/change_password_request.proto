edition = "2023";

package UEventAnalysisToolAPI.V1.UserSettings;

/**
 * Updates the user's password.  Here, the user will be forced through
 * basic authentication - i.e., they will have to provide their username and
 * current password which will be put into the Authorization: Basic header.
 * Additionally, this request may take longer than anticipated to process
 * depending on the server's hashing algorithm.
 */
message ChangePasswordRequest {
   // A request identifier.
   string identifier = 1 [default = ""];
   // The new password (plain text - the backend will handle hashing).
   string new_password = 2;
}
