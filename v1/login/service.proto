edition = "2023";

package UEventAnalysisToolAPI.V1.Login;

import "uEventAnalysisToolAPI/v1/login/basic_request.proto";
import "uEventAnalysisToolAPI/v1/login/basic_response.proto";
import "uEventAnalysisToolAPI/v1/login/change_password_request.proto";
import "uEventAnalysisToolAPI/v1/login/change_password_response.proto";
import "uEventAnalysisToolAPI/v1/login/list_keys_request.proto";
import "uEventAnalysisToolAPI/v1/login/list_keys_response.proto";
import "uEventAnalysisToolAPI/v1/login/remove_key_request.proto";
import "uEventAnalysisToolAPI/v1/login/remove_key_response.proto";

/**
 * Handles login requests and simple user credentials management.  
 */
service LoginService {
   // A basic login request.  In this case the client will pass their
   // credentials in the HTTP Authorization: Basic safsadfsdfsd== field where
   // the user name and password are a base64 encoded string of the from
   // user:password  
   rpc BasicLogin(BasicRequest) returns(BasicResponse) {}; 
   // Allows user to list their keys.  
   rpc ListKeys(ListKeysRequest) returns(ListKeysResponse) {};
   // Allows user to delete a key.
   rpc RemoveKey(RemoveKeyRequest) returns(RemoveKeyResponse) {};
   // Allows a user to add a key.
   rpc AddKey(AddKeyRequest) returns(AddKeyResponse) {};
   // Allows a user to change their password.
   rpc ChangePassword(ChangePasswordRequest) returns(ChangePasswordResponse) {};
}
