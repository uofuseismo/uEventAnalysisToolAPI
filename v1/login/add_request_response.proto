edition = "2023";

import "google/protobuf/duration.proto";

package UEventAnalysisToolAPI.V1.Login;

/**
 * Allows user to add a PUBLIC key.  
 * Note, the user name will be lifted from the user's session token.
 */
message AddKeyRequest {
   // A request identifier.
   string identifier = 1 [default = ""];
   // The key algorithm.
   string algorithm = 2 [default = "ed25519"];
   // The key expires after this duration.  
   google.protobuf.duration = 3;
}
